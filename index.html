<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CLOCK">
  <title>CLOCK</title>
  
  <!-- PWAマニフェスト（アイコンに IMG_1531.WEBP を指定） -->
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22CLOCK%22%2C%22short_name%22%3A%22CLOCK%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22IMG_1531.WEBP%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fwebp%22%7D%5D%7D">

  <!-- iOS用アイコン -->
  <link rel="apple-touch-icon" href="IMG_1531.WEBP">

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 焼き付き防止コンテナ */
    #clock-container {
      width: 90vmin;
      height: 90vmin;
      position: relative;
      transition: transform 0.5s ease;
      will-change: transform;
    }

    /* 文字盤 */
    .clock-face {
      width: 100%;
      height: 100%;
      border: 2px solid #333333;
      border-radius: 50%;
      position: relative;
    }

    /* 目盛り */
    .tick {
      position: absolute;
      width: 2px;
      height: 15px;
      background-color: #444444;
      top: 10px;
      left: 50%;
      transform-origin: 50% calc(45vmin - 10px);
    }
    .tick.major {
      width: 4px;
      height: 20px;
      background-color: #888888;
    }

    /* 針の共通スタイル */
    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px;
      transition: transform 0.6s cubic-bezier(0.4, 2.08, 0.55, 1);
    }

    /* 時針 */
    .hour-hand {
      width: 8px;
      height: 25%;
      background-color: #aaaaaa;
      margin-left: -4px;
    }

    /* 分針 */
    .minute-hand {
      width: 4px;
      height: 40%;
      background-color: #e0e0e0;
      margin-left: -2px;
    }

    /* センターピン */
    .center-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      background-color: #e0e0e0;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div id="clock-container">
    <div class="clock-face" id="clock-face">
      <div class="hand hour-hand" id="hour-hand"></div>
      <div class="hand minute-hand" id="minute-hand"></div>
      <div class="center-dot"></div>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. 時計のロジック（日本時間・省エネ）
    // ==========================================
    const clockContainer = document.getElementById('clock-container');
    const hourHand = document.getElementById('hour-hand');
    const minuteHand = document.getElementById('minute-hand');
    const clockFace = document.getElementById('clock-face');

    for (let i = 0; i < 12; i++) {
      const tick = document.createElement('div');
      tick.classList.add('tick');
      if (i % 3 === 0) tick.classList.add('major');
      tick.style.transform = `translateX(-50%) rotate(${i * 30}deg)`;
      clockFace.appendChild(tick);
    }

    function updateClock() {
      const options = { timeZone: 'Asia/Tokyo', hour: 'numeric', minute: 'numeric', hour12: false };
      const formatter = new Intl.DateTimeFormat('ja-JP', options);
      const parts = formatter.formatToParts(new Date());

      const hours = parseInt(parts.find(p => p.type === 'hour').value, 10);
      const minutes = parseInt(parts.find(p => p.type === 'minute').value, 10);

      const minuteDeg = minutes * 6;
      const hourDeg = (hours % 12) * 30 + minutes * 0.5;

      hourHand.style.transform = `rotate(${hourDeg}deg)`;
      minuteHand.style.transform = `rotate(${minuteDeg}deg)`;

      // ピクセルシフト（焼き付き防止）
      const randomX = Math.floor(Math.random() * 7) - 3;
      const randomY = Math.floor(Math.random() * 7) - 3;
      clockContainer.style.transform = `translate(${randomX}px, ${randomY}px)`;
    }

    updateClock();
    setInterval(updateClock, 10000); // 10秒に1回チェック（省エネ）

    // 常時点灯リクエスト
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
      } catch (err) {}
    }
    document.addEventListener('click', requestWakeLock);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    // ==========================================
    // 2. オフライン動作のためのキャッシュ制御（PWA）
    // ==========================================
    const CACHE_NAME = 'clock-v1';
    const ASSETS = [
      './',
      './index.html',
      './IMG_1531.WEBP'
    ];

    if ('serviceWorker' in navigator) {
      // サービスワーカーの処理をインライン化して動的に登録
      const swCode = `
        const CACHE_NAME = '${CACHE_NAME}';
        const ASSETS = ${JSON.stringify(ASSETS)};

        self.addEventListener('install', (e) => {
          e.waitUntil(
            caches.open(CACHE_NAME).then((cache) => cache.addAll(ASSETS))
          );
          self.skipWaiting();
        });

        self.addEventListener('activate', (e) => {
          e.waitUntil(
            caches.keys().then((keys) => {
              return Promise.all(
                keys.map((key) => {
                  if (key !== CACHE_NAME) return caches.delete(key);
                })
              );
            })
          );
          self.clients.claim();
        });

        self.addEventListener('fetch', (e) => {
          e.respondWith(
            caches.match(e.request).then((response) => {
              return response || fetch(e.request);
            })
          );
        });
      `;

      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);

      navigator.serviceWorker.register(swUrl, { scope: './' })
        .then(() => console.log('Offline cache ready.'))
        .catch((err) => console.error('Worker registration failed:', err));
    }
  </script>
</body>
</html>
