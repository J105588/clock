<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <!-- 拡大禁止のメタタグ（初期・最大スケール固定） -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CLOCK">
  <title>CLOCK</title>

  <link rel="manifest"
    href="data:application/json;charset=utf-8,%7B%22name%22%3A%22CLOCK%22%2C%22short_name%22%3A%22CLOCK%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    * {
      box-sizing: border-box;
      /* 選択、ハイライトの禁止 */
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100dvh;
      /* スマホのツールバーに影響されない動的なビューポート高さ */
      background-color: #000000;
      /* 拡大・スクロール・バウンスの完全禁止（CSSレベル） */
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;

      display: flex;
      justify-content: center;
      align-items: center;
      /* 背景色の滑らかな変化（1.5秒クロスフェード） */
      transition: background-color 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    body.flash-active {
      background-color: #ffffff !important;
    }

    /* アナログ時計コンテナ */
    #clock-container {
      width: 90vmin;
      height: 90vmin;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      margin: auto;
      /* 常に画面中央に固定 */
      transition: transform 0.5s ease, opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: transform, opacity;
      opacity: 1;
    }

    /* 文字盤と目盛り */
    .clock-face {
      width: 100%;
      height: 100%;
      border: 2px solid #333333;
      border-radius: 50%;
      position: relative;
    }

    .tick {
      position: absolute;
      width: 2px;
      height: 15px;
      background-color: #444444;
      top: 10px;
      left: 50%;
      transform-origin: 50% calc(45vmin - 10px);
    }

    .tick.major {
      width: 4px;
      height: 20px;
      background-color: #888888;
    }

    /* 針 */
    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px;
      transition: transform 0.6s cubic-bezier(0.4, 2.08, 0.55, 1);
    }

    .hour-hand {
      width: 8px;
      height: 25%;
      background-color: #aaaaaa;
      margin-left: -4px;
    }

    .minute-hand {
      width: 4px;
      height: 40%;
      background-color: #e0e0e0;
      margin-left: -2px;
    }

    .center-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      background-color: #e0e0e0;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* デジタル時計 */
    #digital-clock {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24vw;
      font-weight: 300;
      color: #000000;
      opacity: 0;
      transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: opacity;
      pointer-events: none;
    }

    @media (orientation: landscape) {
      #digital-clock {
        font-size: 22vh;
      }
    }

    /* 日付表示 */
    #date-display {
      position: absolute;
      bottom: max(24px, env(safe-area-inset-bottom));
      right: max(24px, env(safe-area-inset-right));
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #666666;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none;
      z-index: 10;
    }

    #date-display.visible {
      opacity: 1;
      transform: translateY(0);
    }

    body.flash-active #date-display {
      opacity: 0 !important;
      transform: translateY(8px) !important;
    }
  </style>
</head>

<body>

  <div id="clock-container">
    <div class="clock-face" id="clock-face">
      <div class="hand hour-hand" id="hour-hand"></div>
      <div class="hand minute-hand" id="minute-hand"></div>
      <div class="center-dot"></div>
    </div>
  </div>

  <div id="digital-clock">00:00</div>
  <div id="date-display"></div>

  <script>
    // ==========================================
    // 拡大・スクロールの完全禁止（JavaScriptレベル）
    // ==========================================
    document.addEventListener('touchmove', function (e) {
      e.preventDefault();
    }, { passive: false });


    // ==========================================
    // 時計ロジック
    // ==========================================
    const bodyEl = document.body;
    const clockContainer = document.getElementById('clock-container');
    const hourHand = document.getElementById('hour-hand');
    const minuteHand = document.getElementById('minute-hand');
    const clockFace = document.getElementById('clock-face');
    const digitalClock = document.getElementById('digital-clock');

    // 目盛り生成
    for (let i = 0; i < 12; i++) {
      const tick = document.createElement('div');
      tick.classList.add('tick');
      if (i % 3 === 0) tick.classList.add('major');
      tick.style.transform = `translateX(-50%) rotate(${i * 30}deg)`;
      clockFace.appendChild(tick);
    }

    let isAnimationRunning = false;

    function getJSTParts() {
      const options = { timeZone: 'Asia/Tokyo', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false };
      const formatter = new Intl.DateTimeFormat('ja-JP', options);
      const parts = formatter.formatToParts(new Date());
      return {
        hours: parseInt(parts.find(p => p.type === 'hour').value, 10),
        minutes: parseInt(parts.find(p => p.type === 'minute').value, 10),
        seconds: parseInt(parts.find(p => p.type === 'second').value, 10)
      };
    }

    function updateDate() {
      const jstDate = new Date();
      
      // JSTでの年月日を取得
      const dateParts = new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).formatToParts(jstDate);
      
      const year = dateParts.find(p => p.type === 'year').value;
      const month = dateParts.find(p => p.type === 'month').value;
      const day = dateParts.find(p => p.type === 'day').value;

      // JSTでの曜日（英語大文字表記）を取得
      const weekday = new Intl.DateTimeFormat('en-US', {
        timeZone: 'Asia/Tokyo',
        weekday: 'short'
      }).format(jstDate).toUpperCase();

      const dateDisplay = document.getElementById('date-display');
      dateDisplay.textContent = `${year}.${month}.${day} ${weekday}`;
    }

    function updateClock() {
      const { hours, minutes, seconds } = getJSTParts();

      if (!isAnimationRunning) {
        const minuteDeg = minutes * 6;
        const hourDeg = (hours % 12) * 30 + minutes * 0.5;
        hourHand.style.transform = `rotate(${hourDeg}deg)`;
        minuteHand.style.transform = `rotate(${minuteDeg}deg)`;
      }

      // 毎時0分00秒の自動発動
      if (minutes === 0 && seconds === 0 && !isAnimationRunning) {
        playAnimation(hours, minutes);
      }

      // 日付表示の更新
      updateDate();
    }

    // クロスフェード演出の本体
    function playAnimation(targetHour, targetMinute) {
      if (isAnimationRunning) return;
      isAnimationRunning = true;

      // デジタル時計にセットする時刻（自動0分でも、手動の現在時刻でも対応）
      const displayHour = String(targetHour).padStart(2, '0');
      const displayMinute = String(targetMinute).padStart(2, '0');
      digitalClock.textContent = `${displayHour}:${displayMinute}`;

      // STEP 1: アナログ消去、背景白、デジタル表示（1.5秒）
      clockContainer.style.opacity = '0';
      bodyEl.classList.add('flash-active');
      digitalClock.style.opacity = '1';

      // STEP 2: ホワイトアウト状態をキープ（4秒間）
      setTimeout(() => {
        // STEP 3: 全てを元に戻すクロスフェード（1.5秒）
        bodyEl.classList.remove('flash-active');
        digitalClock.style.opacity = '0';
        clockContainer.style.opacity = '1';

        // STEP 4: 終了後に状態リセット
        setTimeout(() => {
          isAnimationRunning = false;
          updateClock(); // 針の位置を同期
        }, 1500);

      }, 4000);
    }

    // メインループ
    updateClock();
    setInterval(updateClock, 1000);


    // ==========================================
    // 5回連続タップの検知（隠し機能）＆ Wake Lock
    // ==========================================
    let tapCount = 0;
    let tapTimeout = null;
    let wakeLock = null;

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
      } catch (err) { }
    }

    document.addEventListener('click', () => {
      // タップで画面常時点灯をリクエスト
      requestWakeLock();

      tapCount++;
      clearTimeout(tapTimeout);

      if (tapCount >= 5) {
        tapCount = 0; // リセット
        const { hours, minutes } = getJSTParts(); // その瞬間の時間を取得
        playAnimation(hours, minutes); // 演出トリガー
      } else {
        // タップが途切れたらタップ回数に応じた処理を実行
        tapTimeout = setTimeout(() => {
          if (tapCount === 2) {
            // ダブルタップ（2回タップ）で日付表示をトグル
            const dateDisplay = document.getElementById('date-display');
            dateDisplay.classList.toggle('visible');
          }
          tapCount = 0; // リセット
        }, 280); // ダブルタップ検知の猶予時間（280ms）
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });


    // ==========================================
    // サービスワーカー（オフライン動作 ＆ キャッシュ自動更新）
    // ==========================================
    if ('serviceWorker' in navigator) {
      // 既存の古い Blob URL サービスワーカーがあれば登録解除してクリーンアップする
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        for (const registration of registrations) {
          const scriptURL = registration.active?.scriptURL || 
                            registration.installing?.scriptURL || 
                            registration.waiting?.scriptURL;
          if (scriptURL && scriptURL.startsWith('blob:')) {
            registration.unregister();
          }
        }
      });

      // sw.js を登録 (ブラウザのHTTPキャッシュを無視して常に最新をチェック)
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then((reg) => {
        // ページ読み込み時に即座にアップデートの有無を確認
        reg.update();
      });

      // 新しいサービスワーカーがアクティベートされて制御を開始したらページを自動リロード
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          // すでに以前のコントローラー（古いサービスワーカー）が存在していた場合のみリロードを実行
          if (navigator.serviceWorker.controller) {
            window.location.reload();
          }
        }
      });
    }
  </script>
</body>

</html>
